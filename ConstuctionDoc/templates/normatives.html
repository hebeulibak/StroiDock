<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нормативная база - СтройДок</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-clipboard-check"></i> СтройДок
            </a>
            <a href="/" class="btn btn-outline-light btn-sm">
                <i class="bi bi-building"></i> К объектам
            </a>
        </div>
    </nav>

    <div class="container mt-4">
        <h2><i class="bi bi-book"></i> Нормативная документация</h2>
        
        <!-- Фильтры -->
        <div class="row mt-3 mb-4">
            <div class="col-md-8">
                <form method="GET" class="d-flex gap-2">
                    <input type="text" name="search" class="form-control" placeholder="Поиск по номеру, названию..." value="{{ search }}">
                    <button type="submit" class="btn btn-primary">Поиск</button>
                </form>
            </div>
            <div class="col-md-4">
                <select class="form-select" onchange="location.href='/normatives?type='+this.value">
                    <option value="">Все типы</option>
                    <option value="СП" {% if selected_type == 'СП' %}selected{% endif %}>СП (Своды правил)</option>
                    <option value="ГОСТ" {% if selected_type == 'ГОСТ' %}selected{% endif %}>ГОСТ</option>
                    <option value="СНиП" {% if selected_type == 'СНиП' %}selected{% endif %}>СНиП</option>
                    <option value="Закон" {% if selected_type == 'Закон' %}selected{% endif %}>Законы</option>
                    <option value="Приказ" {% if selected_type == 'Приказ' %}selected{% endif %}>Приказы</option>
                </select>
            </div>
        </div>

        <!-- Список документов -->
        <div class="row">
            {% for doc in normatives %}
            <div class="col-md-6 col-lg-4 mb-3">
                <div class="card h-100">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start">
                            <span class="badge bg-secondary">{{ doc.doc_type.value }}</span>
                            <a href="/normative/favorite/{{ doc.id }}/{{ 0 if doc.is_favorite else 1 }}" class="text-warning">
                                <i class="bi bi-star{% if not doc.is_favorite %}-fill text-muted{% endif %}"></i>
                            </a>
                        </div>
                        <h6 class="mt-2">{{ doc.number }}</h6>
                        <p class="small">{{ doc.title[:80] }}{% if doc.title|length > 80 %}...{% endif %}</p>
                        <div class="mt-2">
                            <span class="badge bg-success">{{ doc.status }}</span>
                        </div>
                    </div>
                    <div class="card-footer bg-transparent">
                        <a href="/normative/{{ doc.id }}" class="btn btn-sm btn-outline-primary w-100">Открыть документ</a>
                    </div>
                </div>
            </div>
            {% else %}
            <div class="col-12">
                <div class="alert alert-info">Документов не найдено</div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
