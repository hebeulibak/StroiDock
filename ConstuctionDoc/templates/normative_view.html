<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ doc.number }} - СтройДок</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        pre {
            white-space: pre-wrap;
            font-family: inherit;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-clipboard-check"></i> СтройДок
            </a>
            <a href="/normatives" class="btn btn-outline-light btn-sm">
                <i class="bi bi-arrow-left"></i> Назад
            </a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card">
            <div class="card-header bg-white">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <span class="badge bg-secondary">{{ doc.doc_type.value }}</span>
                        <span class="badge bg-success ms-1">{{ doc.status }}</span>
                    </div>
                    <a href="/normative/favorite/{{ doc.id }}/{{ 0 if doc.is_favorite else 1 }}" class="text-warning">
                        <i class="bi bi-star{% if not doc.is_favorite %}-fill text-muted{% endif %} fs-4"></i>
                    </a>
                </div>
                <h3 class="mt-2">{{ doc.number }}</h3>
                <p class="text-muted">{{ doc.full_title }}</p>
            </div>
            <div class="card-body">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <small class="text-muted">Дата актуализации</small>
                        <div>{{ doc.actual_date }}</div>
                    </div>
                    <div class="col-md-6">
                        <small class="text-muted">Заменяет/Заменён</small>
                        <div>{{ doc.replaced_by or "—" }}</div>
                    </div>
                </div>
                <hr>
                <div class="mt-3">
                    <pre>{{ doc.content }}</pre>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
