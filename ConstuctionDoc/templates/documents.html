<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ section_name }} - СтройДок</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <span class="navbar-brand"><i class="bi bi-folder"></i> {{ section_name }}: {{ site.name }}</span>
            <a href="/" class="btn btn-outline-light">На главную</a>
        </div>
    </nav>

    <div class="container mt-3">
        <div class="row">
            <div class="col-12">
                <button class="btn btn-success mb-3" data-bs-toggle="modal" data-bs-target="#addDocumentModal">
                    <i class="bi bi-plus-lg"></i> Добавить документ
                </button>
            </div>
        </div>

        <div class="row">
            {% for doc in docs %}
            <div class="col-md-6 col-12 mb-3">
                <div class="card">
                    <div class="card-body">
                        <div class="d-flex justify-content-between">
                            <h6>{{ doc.title }}</h6>
                            <span class="badge bg-secondary">{{ doc.date }}</span>
                        </div>
                        <p class="small text-muted">№ {{ doc.document_number }}</p>
                        <p>{{ doc.description }}</p>
                        <a href="/document/delete/{{ doc.id }}" class="btn btn-sm btn-danger" onclick="return confirm('Удалить?')">
                            <i class="bi bi-trash"></i> Удалить
                        </a>
                    </div>
                </div>
            </div>
            {% else %}
            <div class="col-12">
                <div class="alert alert-info">Нет документов. Нажмите "Добавить документ"</div>
            </div>
            {% endfor %}
        </div>
    </div>

    <!-- Модальное окно добавления документа -->
    <div class="modal fade" id="addDocumentModal">
        <div class="modal-dialog">
            <div class="modal-content">
                <form method="POST" action="/document/add">
                    <div class="modal-header bg-primary text-white">
                        <h5>Добавить документ</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" name="site_id" value="{{ site.id }}">
                        <input type="hidden" name="section" value="{{ section }}">
                        
                        <input type="text" name="title" class="form-control mb-2" placeholder="Название документа" required>
                        <input type="text" name="document_number" class="form-control mb-2" placeholder="Номер документа">
                        <input type="date" name="date" class="form-control mb-2" value="{{ now().strftime('%Y-%m-%d') if now else '' }}">
                        <textarea name="description" class="form-control mb-2" rows="3" placeholder="Описание"></textarea>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                        <button type="submit" class="btn btn-primary">Сохранить</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
